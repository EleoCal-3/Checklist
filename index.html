<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Montagna">
<title>MONTAGNA</title>
<style>

  :root {
    --bg: #FFFFFF;
    --border: #E0E0E0;
    --border-strong: #0A0A0A;
    --text: #0A0A0A;
    --muted: #999999;
    --light: #F7F7F7;
    --font-title: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    --font-mono: 'SF Mono', 'Menlo', 'Courier New', monospace;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0A0A0A;
      --border: #2A2A2A;
      --border-strong: #F0F0F0;
      --text: #F0F0F0;
      --muted: #666666;
      --light: #141414;
    }
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(80px + var(--safe-bottom));
    -webkit-text-size-adjust: 100%;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg);
    border-bottom: 2px solid var(--border-strong);
    padding: 20px 20px 0;
    padding-top: calc(20px + env(safe-area-inset-top, 0px));
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }

  .title-block { display: flex; flex-direction: column; gap: 2px; }

  .title-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .title {
    font-family: var(--font-title);
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .reset-btn {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 12px;
    cursor: pointer;
    min-height: 32px;
  }

  .progress-row { display: flex; align-items: center; gap: 10px; }

  .progress-bar-wrap { width: 72px; height: 1px; background: var(--border); }
  .progress-bar-fill { height: 100%; background: var(--text); transition: width 0.3s; }

  .progress-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── MODE TOGGLE ── */
  .mode-toggle {
    display: flex;
    margin: 0 -20px;
    border-top: 1px solid var(--border);
  }

  .mode-btn {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    border-top: 2px solid transparent;
    padding: 12px 0;
    cursor: pointer;
    margin-top: -1px;
    min-height: 44px;
  }
  .mode-btn.active {
    color: var(--text);
    border-top-color: var(--text);
    background: var(--light);
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    border-top: 1px solid var(--border);
    margin: 0 -20px;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    border-top: 2px solid transparent;
    padding: 10px 18px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: -1px;
    min-height: 40px;
  }
  .tab.active {
    color: var(--text);
    border-top-color: var(--text);
    background: var(--light);
  }

  /* ── CONTENT ── */
  .content { padding: 0 0 20px; }

  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.12s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── SECTION META ── */
  .section-meta {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 16px 20px 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: var(--font-title);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .section-count {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  /* ── PHASE NOTE ── */
  .phase-note {
    padding: 12px 20px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--muted);
    line-height: 1.7;
    border-bottom: 1px solid var(--border);
    background: var(--light);
  }

  /* ── GROUP LABEL ── */
  .group-label {
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 20px 6px;
  }

  /* ── CHECKLIST ── */
  .check-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    user-select: none;
    min-height: 50px;
  }
  .check-item.checked { background: var(--light); }

  .checkbox {
    width: 20px;
    height: 20px;
    border: 1.5px solid #BDBDBD;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    border-radius: 2px;
  }
  .check-item.checked .checkbox { background: var(--text); border-color: var(--text); }

  .checkmark { opacity: 0; transition: opacity 0.12s; }
  .check-item.checked .checkmark { opacity: 1; }
  .sop-step.checked .checkmark { opacity: 1; }

  .item-text {
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.02em;
    color: var(--text);
    line-height: 1.4;
  }
  .check-item.checked .item-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: #BDBDBD;
  }

  /* ── SOP STEPS ── */
  .sop-step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    min-height: 56px;
  }
  .sop-step.checked { background: var(--light); }

  .step-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .step-num {
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .step-checkbox {
    width: 20px;
    height: 20px;
    border: 1.5px solid #BDBDBD;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    border-radius: 2px;
  }
  .sop-step.checked .step-checkbox { background: var(--text); border-color: var(--text); }

  .step-body { display: flex; flex-direction: column; gap: 3px; flex: 1; }

  .who-badge {
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .step-text {
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.02em;
    color: var(--text);
    line-height: 1.5;
  }
  .sop-step.checked .step-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: #BDBDBD;
  }

  /* ── CHECKPOINT ── */
  .sop-checkpoint {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid var(--text);
    background: var(--light);
    cursor: pointer;
    user-select: none;
    gap: 14px;
    min-height: 64px;
    transition: opacity 0.1s;
  }
  .sop-checkpoint.checked { opacity: 0.4; }

  .checkpoint-body { display: flex; flex-direction: column; gap: 3px; }

  .checkpoint-label {
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .checkpoint-cta {
    font-family: var(--font-title);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
  }

  .checkpoint-arrow {
    font-size: 22px;
    color: var(--text);
    flex-shrink: 0;
  }

  /* ── FERRATA BAR ── */
  .ferrata-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--light);
    border-bottom: 1px solid var(--border);
    min-height: 48px;
  }

  .ferrata-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .ferrata-toggle {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    cursor: pointer;
    min-height: 36px;
    min-width: 60px;
  }
  .ferrata-toggle.on { color: var(--text); border-color: var(--text); }

  /* ── NUOVA ESCURSIONE BTN ── */
  .nuova-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 24px 20px 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--text);
    border: none;
    padding: 16px;
    cursor: pointer;
    min-height: 52px;
  }
  .nuova-btn:active { opacity: 0.8; }

  /* ── PIN OVERLAY ── */
  .pin-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    padding-top: calc(40px + env(safe-area-inset-top, 0px));
  }

  .pin-app-title {
    font-family: var(--font-title);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 6px;
  }

  .pin-app-sub {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 48px;
  }

  .pin-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .pin-dots {
    display: flex;
    gap: 16px;
    margin-bottom: 8px;
  }

  .pin-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    transition: all 0.15s;
  }
  .pin-dot.filled {
    background: var(--text);
    border-color: var(--text);
  }

  .pin-error {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #cc0000;
    height: 20px;
    margin-bottom: 32px;
    text-align: center;
  }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    gap: 12px;
  }

  .pin-key {
    height: 72px;
    font-family: var(--font-title);
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    background: var(--light);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.1s;
  }
  .pin-key:active { background: var(--border); }
  .pin-key.delete { font-size: 20px; }
  .pin-key.empty { background: none; border-color: transparent; cursor: default; }

  /* ── ERROR ── */
  .error-msg {
    padding: 40px 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: #cc0000;
    line-height: 1.6;
    white-space: pre-wrap;
  }

</style>
</head>
<body>

<!-- PIN OVERLAY -->
<div class="pin-overlay" id="pin-overlay">
  <div class="pin-app-title">MONTAGNA</div>
  <div class="pin-app-sub">Guida Escursioni</div>
  <div class="pin-label" id="pin-label">Imposta PIN</div>
  <div class="pin-dots" id="pin-dots">
    <span class="pin-dot" id="d0"></span>
    <span class="pin-dot" id="d1"></span>
    <span class="pin-dot" id="d2"></span>
    <span class="pin-dot" id="d3"></span>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinKey('1')">1</button>
    <button class="pin-key" onclick="pinKey('2')">2</button>
    <button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button>
    <button class="pin-key" onclick="pinKey('5')">5</button>
    <button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button>
    <button class="pin-key" onclick="pinKey('8')">8</button>
    <button class="pin-key" onclick="pinKey('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinKey('0')">0</button>
    <button class="pin-key delete" onclick="pinDelete()">&#x232B;</button>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div class="title-block">
      <span class="title-label">Guida Escursioni</span>
      <div class="title">MONTAGNA</div>
    </div>
    <div class="header-right">
      <button class="reset-btn" onclick="resetAll()">Reset</button>
      <div class="progress-row">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
        </div>
        <span class="progress-label" id="progress-text">00 / 00</span>
      </div>
    </div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-prepara" onclick="setMode('prepara')">Prepara</button>
    <button class="mode-btn" id="btn-controlla" onclick="setMode('controlla')">Controlla</button>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="content" id="content"></div>

<script>

// ─── DATI SOP ─────────────────────────────────────────────────────────────────

var sopData = [
  {
    id: 't24', tab: 'T-24h', label: 'Preparazione',
    note: 'Da leggere insieme la sera prima per coordinare ricariche e bagagli.',
    steps: [
      { who: 'Insieme',  text: 'Controllare le previsioni meteo e decidere se attivare la Variante Ferrata.' },

      { who: 'Insieme',  text: 'Controllo rapido zecche sui vestiti prima di salire in auto.' }

// ─── DATI CHECKLIST ───────────────────────────────────────────────────────────

var checklistData = [
  {
    id: 'eleonora', tab: 'Eleonora',
    groups: [
      { label: 'Abbigliamento', items: ['Pantaloni tecnici', 'Maglia', 'Camicia', 'Felpa', 'Calze trekking'] },

      { label: 'Cibo', items: ['Merenda (frutta secca + cioccolata)', 'Pranzo', 'Bustina comfort (caffe / tisana / zucchero)', 'Tazza e cucchiaio'] },

    ],
    ferrata: ['Kit Ferrata', 'Fettuccia e moschettone', 'Caschetto']
  },
  {
    id: 'laura', tab: 'Laura',
    groups: [
      { label: 'Abbigliamento', items: ['Pantaloni tecnici', 'Maglia', 'Camicia', 'Felpa', 'Calze trekking'] },
      { label: 'Accessori', items: ['Bandana', 'Occhiali da sole', 'Cappellino'] },
      { label: 'Zaino - Core', items: ['Antipioggia', 'Borraccia + Camelback', 'Cambio maglia + calzini', 'Torcia frontale', 'Kefia', 'Paraculetto'] },
      { label: 'Comfort Kit', items: ['Fazzoletti', 'Salviette umide', '2 OKI', 'Burrocacao'] },
      { label: 'Cibo', items: ['Merenda (frutta secca + cioccolata)', 'Pranzo', 'Bustina comfort (caffe / tisana / zucchero)', 'Tazza e cucchiaio', 'Bombola e Fornelletto'] },
      { label: 'Acqua', items: ['Borraccia', 'Camelback'] }
    ],
    ferrata: ['Kit Ferrata', 'Fettuccia e moschettone', 'Caschetto']
  },
  {
    id: 'auto', tab: 'Auto',
    groups: [
      { label: 'In auto', items: ['Cambio scarpe', 'Cambio felpa', 'Cambio maglia e calzini', 'Spray anti-zecche', 'Crema solare', 'Thermos + merenda aggiuntiva'] }
    ]
  }
];

// ─── STATE ────────────────────────────────────────────────────────────────────

var mode = 'prepara';
var activeSopTab = 't24';
var activeCheckTab = 'eleonora';
var ferrataOn = false;
var state = {};

function saveState() {
  try {
    localStorage.setItem('montagna_state', JSON.stringify(state));
    localStorage.setItem('montagna_mode', mode);
    localStorage.setItem('montagna_sop', activeSopTab);
    localStorage.setItem('montagna_check', activeCheckTab);
    localStorage.setItem('montagna_ferrata', ferrataOn ? '1' : '0');
  } catch(e) {}
}

function loadState() {
  try {
    var s = localStorage.getItem('montagna_state');
    if (s) state = JSON.parse(s);
    var m = localStorage.getItem('montagna_mode');
    if (m) mode = m;
    var sop = localStorage.getItem('montagna_sop');
    if (sop) activeSopTab = sop;
    var chk = localStorage.getItem('montagna_check');
    if (chk) activeCheckTab = chk;
    ferrataOn = localStorage.getItem('montagna_ferrata') === '1';
  } catch(e) {}
}

// ─── SVG CHECKMARK ────────────────────────────────────────────────────────────

function svgCheck(checked) {
  return '<svg class="checkmark" width="11" height="11" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">'
    + '<path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
    + '</svg>';
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function renderUI() {
  var tabsEl = document.getElementById('tabs');
  var contentEl = document.getElementById('content');
  tabsEl.innerHTML = '';
  contentEl.innerHTML = '';

  if (mode === 'prepara') {
    renderSop(tabsEl, contentEl);
  } else {
    renderChecklist(tabsEl, contentEl);
  }

  updateProgress();
  updateCounts();
}

function renderSop(tabsEl, contentEl) {
  var i, j, sec, step, tab, div, html, id, stepNum;

  for (i = 0; i < sopData.length; i++) {
    sec = sopData[i];
    tab = document.createElement('button');
    tab.className = 'tab' + (sec.id === activeSopTab ? ' active' : '');
    tab.textContent = sec.tab;
    tab.setAttribute('data-id', sec.id);
    tab.onclick = (function(sid) {
      return function() { activeSopTab = sid; renderUI(); saveState(); };
    })(sec.id);
    tabsEl.appendChild(tab);
  }

  for (i = 0; i < sopData.length; i++) {
    sec = sopData[i];
    div = document.createElement('div');
    div.className = 'section' + (sec.id === activeSopTab ? ' active' : '');
    div.id = 'section-' + sec.id;

    stepNum = 0;
    html = '<div class="section-meta">'
      + '<span class="section-title">' + sec.label + '</span>'
      + '<span class="section-count" id="sop-count-' + sec.id + '"></span>'
      + '</div>';

    if (sec.note) {
      html += '<div class="phase-note">' + sec.note + '</div>';
    }

    html += '<div>';

    for (j = 0; j < sec.steps.length; j++) {
      step = sec.steps[j];
      id = sec.id + '_' + j;
      if (!(id in state)) state[id] = false;

      if (step.isCheckpoint) {
        html += '<div class="sop-checkpoint' + (state[id] ? ' checked' : '') + '" id="item-' + id + '" onclick="handleCheckpoint(\'' + id + '\')">'
          + '<div class="checkpoint-body">'
          + '<span class="checkpoint-label">controlla attrezzatura</span>'
          + '<span class="checkpoint-cta">' + step.text + '</span>'
          + '</div>'
          + '<span class="checkpoint-arrow">&#8599;</span>'
          + '</div>';
      } else {
        stepNum++;
        html += '<div class="sop-step' + (state[id] ? ' checked' : '') + '" id="item-' + id + '" onclick="toggleItem(\'' + id + '\')">'
          + '<div class="step-left">'
          + '<span class="step-num">' + (stepNum < 10 ? '0' + stepNum : stepNum) + '</span>'
          + '<div class="step-checkbox">' + svgCheck() + '</div>'
          + '</div>'
          + '<div class="step-body">'
          + '<span class="who-badge">' + step.who + '</span>'
          + '<span class="step-text">' + step.text + '</span>'
          + '</div>'
          + '</div>';
      }
    }

    html += '</div>';

    if (sec.id === 'rientro') {
      html += '<button class="nuova-btn" onclick="nuovaEscursione()">Nuova Escursione — Azzera tutto</button>';
    }

    div.innerHTML = html;
    contentEl.appendChild(div);
  }
}

function renderChecklist(tabsEl, contentEl) {
  var i, j, k, sec, group, tab, div, bar, html, id, item;

  for (i = 0; i < checklistData.length; i++) {
    sec = checklistData[i];
    tab = document.createElement('button');
    tab.className = 'tab' + (sec.id === activeCheckTab ? ' active' : '');
    tab.textContent = sec.tab;
    tab.onclick = (function(sid) {
      return function() { activeCheckTab = sid; renderUI(); saveState(); };
    })(sec.id);
    tabsEl.appendChild(tab);
  }

  if (activeCheckTab !== 'auto') {
    bar = document.createElement('div');
    bar.className = 'ferrata-bar';
    bar.innerHTML = '<span class="ferrata-label">Variante Ferrata</span>'
      + '<button class="ferrata-toggle' + (ferrataOn ? ' on' : '') + '" onclick="toggleFerrata()">'
      + (ferrataOn ? 'ON' : 'OFF') + '</button>';
    contentEl.appendChild(bar);
  }

  for (i = 0; i < checklistData.length; i++) {
    sec = checklistData[i];
    div = document.createElement('div');
    div.className = 'section' + (sec.id === activeCheckTab ? ' active' : '');
    div.id = 'section-' + sec.id;

    html = '<div class="section-meta">'
      + '<span class="section-title">' + sec.tab + '</span>'
      + '<span class="section-count" id="check-count-' + sec.id + '"></span>'
      + '</div>';

    for (j = 0; j < sec.groups.length; j++) {
      group = sec.groups[j];
      html += '<div class="group-label">' + group.label + '</div>';
      for (k = 0; k < group.items.length; k++) {
        item = group.items[k];
        id = sec.id + '_' + j + '_' + k;
        if (!(id in state)) state[id] = false;
        html += checkItemHTML(id, item);
      }
    }

    if (sec.ferrata && ferrataOn) {
      html += '<div class="group-label">Variante Ferrata</div>';
      for (k = 0; k < sec.ferrata.length; k++) {
        item = sec.ferrata[k];
        id = sec.id + '_ferrata_' + k;
        if (!(id in state)) state[id] = false;
        html += checkItemHTML(id, item);
      }
    }

    div.innerHTML = html;
    contentEl.appendChild(div);
  }
}

function checkItemHTML(id, text) {
  return '<div class="check-item' + (state[id] ? ' checked' : '') + '" id="item-' + id + '" onclick="toggleItem(\'' + id + '\')">'
    + '<div class="checkbox">' + svgCheck() + '</div>'
    + '<span class="item-text">' + text + '</span>'
    + '</div>';
}

// ─── INTERAZIONI ──────────────────────────────────────────────────────────────

function setMode(m) {
  mode = m;
  document.getElementById('btn-prepara').className = 'mode-btn' + (m === 'prepara' ? ' active' : '');
  document.getElementById('btn-controlla').className = 'mode-btn' + (m === 'controlla' ? ' active' : '');
  renderUI();
  saveState();
}

function handleCheckpoint(id) {
  state[id] = true;
  saveState();
  setMode('controlla');
}

function toggleItem(id) {
  state[id] = !state[id];
  var el = document.getElementById('item-' + id);
  if (el) el.className = el.className.replace(' checked', '') + (state[id] ? ' checked' : '');
  updateProgress();
  updateCounts();
  saveState();
}

function toggleFerrata() {
  ferrataOn = !ferrataOn;
  saveState();
  renderUI();
}

function resetAll() {
  var k;
  for (k in state) state[k] = false;
  saveState();
  renderUI();
}

function nuovaEscursione() {
  // Conserva il PIN, azzera solo i dati escursione
  var pin = null;
  try { pin = localStorage.getItem(PIN_STORE); } catch(e) {}
  try { localStorage.clear(); } catch(e) {}
  try { if (pin) localStorage.setItem(PIN_STORE, pin); } catch(e) {}
  state = {};
  mode = 'prepara';
  activeSopTab = 't24';
  activeCheckTab = 'eleonora';
  ferrataOn = false;
  document.getElementById('btn-prepara').className = 'mode-btn active';
  document.getElementById('btn-controlla').className = 'mode-btn';
  renderUI();
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────

function updateProgress() {
  var keys = Object.keys(state);
  var done = 0;
  var total = keys.length;
  var i;
  for (i = 0; i < keys.length; i++) {
    if (state[keys[i]]) done++;
  }
  var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
  document.getElementById('progress-text').textContent = pad(done) + ' / ' + pad(total);
  document.getElementById('progress-bar').style.width = total ? (done / total * 100) + '%' : '0%';
}

function updateCounts() {
  var i, keys, done, el, k;
  if (mode === 'prepara') {
    for (i = 0; i < sopData.length; i++) {
      keys = [];
      for (k in state) {
        if (k.indexOf(sopData[i].id + '_') === 0) keys.push(k);
      }
      done = 0;
      for (var j = 0; j < keys.length; j++) { if (state[keys[j]]) done++; }
      el = document.getElementById('sop-count-' + sopData[i].id);
      if (el) el.textContent = done + ' / ' + keys.length;
    }
  } else {
    for (i = 0; i < checklistData.length; i++) {
      keys = [];
      for (k in state) {
        if (k.indexOf(checklistData[i].id + '_') === 0) keys.push(k);
      }
      done = 0;
      for (var j = 0; j < keys.length; j++) { if (state[keys[j]]) done++; }
      el = document.getElementById('check-count-' + checklistData[i].id);
      if (el) el.textContent = done + ' / ' + keys.length;
    }
  }
}

// ─── PIN ──────────────────────────────────────────────────────────────────────

var PIN_STORE = 'montagna_pin';
var PIN_SESSION = 'montagna_unlocked';
var pinBuffer = '';
var pinMode = 'unlock'; // 'setup' | 'confirm' | 'unlock'
var pinFirst = '';

function simpleHash(str) {
  var hash = 5381;
  for (var i = 0; i < str.length; i++) {
    hash = ((hash << 5) + hash) ^ str.charCodeAt(i);
    hash = hash >>> 0;
  }
  return hash.toString(16);
}

function pinKey(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updatePinDots();
  if (pinBuffer.length === 4) {
    setTimeout(processPIN, 120);
  }
}

function pinDelete() {
  if (pinBuffer.length > 0) {
    pinBuffer = pinBuffer.slice(0, -1);
    updatePinDots();
    document.getElementById('pin-error').textContent = '';
  }
}

function updatePinDots() {
  for (var i = 0; i < 4; i++) {
    var d = document.getElementById('d' + i);
    if (d) d.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
  }
}

function processPIN() {
  var stored = null;
  try { stored = localStorage.getItem(PIN_STORE); } catch(e) {}

  if (pinMode === 'setup') {
    pinFirst = pinBuffer;
    pinBuffer = '';
    pinMode = 'confirm';
    document.getElementById('pin-label').textContent = 'Conferma PIN';
    updatePinDots();
    return;
  }

  if (pinMode === 'confirm') {
    if (pinBuffer === pinFirst) {
      try { localStorage.setItem(PIN_STORE, simpleHash(pinBuffer)); } catch(e) {}
      unlockApp();
    } else {
      document.getElementById('pin-error').textContent = 'I PIN non coincidono';
      pinBuffer = '';
      pinFirst = '';
      pinMode = 'setup';
      document.getElementById('pin-label').textContent = 'Imposta PIN';
      updatePinDots();
    }
    return;
  }

  // unlock mode
  if (simpleHash(pinBuffer) === stored) {
    try { sessionStorage.setItem(PIN_SESSION, '1'); } catch(e) {}
    unlockApp();
  } else {
    document.getElementById('pin-error').textContent = 'PIN errato';
    pinBuffer = '';
    updatePinDots();
  }
}

function unlockApp() {
  var overlay = document.getElementById('pin-overlay');
  if (overlay) overlay.style.display = 'none';
}

function initPIN() {
  // Already unlocked this session?
  var session = false;
  try { session = sessionStorage.getItem(PIN_SESSION) === '1'; } catch(e) {}
  if (session) {
    unlockApp();
    return;
  }

  var stored = null;
  try { stored = localStorage.getItem(PIN_STORE); } catch(e) {}

  if (!stored) {
    // First time: setup
    pinMode = 'setup';
    document.getElementById('pin-label').textContent = 'Imposta PIN';
  } else {
    // Has PIN: unlock
    pinMode = 'unlock';
    document.getElementById('pin-label').textContent = 'Inserisci PIN';
  }
  // Overlay is already visible (default)
}

// ─── INIT ────────────────────────────────────────────────────────────────────

try {
  loadState();
  renderUI();
  initPIN();
} catch(e) {
  document.getElementById('content').innerHTML =
    '<div class="error-msg">Errore: ' + e.message + '\n\n' + e.stack + '</div>';
}

</script>
